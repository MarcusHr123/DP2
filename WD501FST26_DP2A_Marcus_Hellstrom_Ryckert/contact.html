<!DOCTYPE html>
<!--Anger att dokumentet använder HTML5-->

<html lang="sv">
<!--Webbsidans språk är svenska-->

<head>

    <!--Teckenkodning som stödjer svenska bokstäver-->
    <meta charset="UTF-8">

    <!--Gör sidan responsiv på mobiler och surfplattor-->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--Titeln som visas i webbläsarens flik-->
    <title>Triple-T</title>

    <!--Importerar Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--Importerar den egna CSS-filen-->
    <link rel="stylesheet" href="cover.css">

</head>

<!--Sidans innehåll-->
<body class="text-center text-bg-dark">

<!--Huvudbehållare som innehåller hela sidan-->
<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">

    <!--Sidhuvud-->
    <header class="mb-auto">

        <!--Navigeringsmeny-->
        <nav class="nav nav-masthead justify-content-center">

            <!--Länk till startsidan-->
            <a class="nav-link" href="index.html">Hem</a>

            <!--Länk till artikelsidan-->
            <a class="nav-link" href="article.html">Artikel</a>

            <!--Länk till sidan med flera artiklar-->
            <a class="nav-link" href="articles.html">Artiklar</a>

            <!--Länk till om-sidan-->
            <a class="nav-link" href="about.html">Om</a>

            <!--Länk till kontaktsidan-->
            <a class="nav-link active" href="contact.html">Kontakt</a>

        </nav>

    </header>

    <!--Huvudinnehåll-->
    <main class="px-3">

        <!--Sidans huvudrubrik-->
        <h1>Kontakta oss</h1>

        <!--Kontaktinformation-->
        <p>
            Vid frågor, vänligen kontakta
            <strong>triple_t@sahurmail.se</strong>

            <br><br>

            Eller fyll i formuläret nedan:
        </p>

        <!--Kontaktformulär-->
        <form action="feedback.html" method="get">

            <!--Fält för namn-->
            <div class="mb-3">

                <label for="name" class="form-label">Namn</label>

                <input
                    type="text"
                    class="form-control"
                    id="name"
                    name="name"
                    required
                    placeholder="Namn">

            </div>

            <!--Fält för e-post-->
            <div class="mb-3">

                <label for="email" class="form-label">E-post</label>

                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    required
                    placeholder="E-post">

            </div>

            <!--Fält för meddelande-->
            <div class="mb-3">

                <label for="message" class="form-label">Meddelande</label>

                <textarea
                    class="form-control"
                    id="message"
                    name="message"
                    rows="5"
                    required
                    placeholder="Skriv ditt meddelande här"></textarea>

            </div>

            <!--Knapp för att skicka formuläret-->
            <button type="submit" class="btn btn-light">
                Skicka
            </button>

        </form>

    </main>

    <!--Sidfot-->
    <footer class="mt-auto text-white-50">

        <!--Copyright-->
        <p>&copy; 2026 Triple-T</p>

    </footer>

</div>

</body>
</html>
